<style>
,::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--gold:#C9A84C;--gold2:#E8D08A;--dark:#0C0C0C;--dark2:#131720;
--dark3:#1A2236;--white:#F5F2EC;--muted:rgba(245,242,236,0.6);
--border:rgba(201,168,76,0.22);
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--white);font-family:'Assistant',sans-serif;direction:rtl;overflow-x:hidden;cursor:none}

/* CUSTOM CURSOR */
#cursor{position:fixed;width:12px;height:12px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:transform 0.1s,opacity 0.2s;mix-blend-mode:difference}
#cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid var(--gold);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:all 0.15s ease;opacity:0.5}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:999;padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:70px;background:rgba(12,12,12,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);transition:all 0.3s}
.nav-logo{
font-family:'Playfair Display',serif;
font-size:22px;
font-weight:700;
color:var(--gold);
letter-spacing:3px;
text-decoration:none;
text-transform:uppercase;
text-shadow:0 0 1px rgba(201,168,76,0.6);
-webkit-font-smoothing:antialiased;
}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{color:var(--muted);font-size:14px;font-weight:400;text-decoration:none;transition:color 0.2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;right:0;width:0;height:1px;background:var(--gold);transition:width 0.3s}
.nav-links a:hover{color:var(--gold)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-links a.active{color:var(--gold)}
.nav-cta{background:var(--gold);color:var(--dark);font-family:'Assistant',sans-serif;font-size:13px;font-weight:700;padding:9px 24px;border:none;cursor:none;text-decoration:none;letter-spacing:0.5px;transition:all 0.2s;direction:ltr;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.nav-cta:hover{opacity:0.85;transform:translateY(-1px)}

/* CITYSCAPE BG ANIMATION */
.cityscape-bg{position:absolute;bottom:0;left:0;width:100%;height:100%;overflow:hidden;z-index:0;opacity:0.18}
.cityscape-bg svg{position:absolute;bottom:0;left:0;width:200%;animation:scrollCity 40s linear infinite}
@keyframes scrollCity{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.car{animation:moveCar linear infinite}
.car1{animation-duration:8s}
.car2{animation-duration:12s;animation-delay:-4s}
.car3{animation-duration:10s;animation-delay:-2s}
.car4{animation-duration:14s;animation-delay:-7s}
@keyframes moveCar{0%{transform:translateX(0)}100%{transform:translateX(200vw)}}
.building-light{animation:blink 3s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.building-light2{animation:blink 4.5s ease-in-out infinite;animation-delay:1s}
.building-light3{animation:blink 2.8s ease-in-out infinite;animation-delay:2s}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:70px 5% 0;position:relative;overflow:hidden}
.hero-content{position:relative;z-index:2;padding:80px 0}
.mobile-hero-content{display:none}

/* TRUST BAR */


/* HERO BADGE */
.hero-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(201,168,76,0.1);border:1px solid var(--border);padding:7px 16px;margin-bottom:30px}
.hero-badge span{font-size:12px;color:var(--gold);font-weight:600;letter-spacing:2px}
.dot{width:6px;height:6px;background:var(--gold);border-radius:50%}

/* HERO TEXT ANIMATIONS */
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(42px,5vw,72px);font-weight:900;line-height:1.05;margin-bottom:8px;white-space:nowrap}
.name-line{display:block;overflow:hidden}
.name-inner{display:block;animation:slideUp 0.8s cubic-bezier(0.16,1,0.3,1) both}
.name-inner:nth-child(1){animation-delay:0.1s}
.name-inner:nth-child(2){animation-delay:0.2s}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.gold{color:var(--gold)}
.hero-tagline{font-size:17px;color:var(--muted);font-weight:300;margin-bottom:12px;animation:fadeIn 1s 0.4s both}
.hero-desc{font-size:15px;color:var(--muted);font-weight:300;line-height:1.8;max-width:440px;margin-bottom:40px;animation:fadeIn 1s 0.5s both}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;animation:fadeIn 1s 0.6s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* SCROLL INDICATOR */
.scroll-indicator{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:2;animation:fadeIn 1s 1.2s both}
.scroll-indicator span{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.scroll-arrow{width:24px;height:24px;border-bottom:1.5px solid var(--gold);border-left:1.5px solid var(--gold);transform:rotate(-45deg);animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:rotate(-45deg) translateY(0)}50%{transform:rotate(-45deg) translateY(6px)}}

.btn-gold{background:var(--gold);color:var(--dark);font-family:'Assistant',sans-serif;font-size:14px;font-weight:700;padding:15px 36px;border:none;cursor:none;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;letter-spacing:0.5px}
.btn-gold:hover{opacity:0.88;transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--white);font-family:'Assistant',sans-serif;font-size:16px;font-weight:500;padding:16px 36px;border:1px solid rgba(245,242,236,0.25);border-radius:10px;cursor:none;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}

/* HERO PHOTO */
.hero-photo-side{position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:center;height:100vh;padding-top:70px}
.hero-photo-wrap{position:relative;width:100%;max-width:420px;height:calc(100vh - 70px)}
.hero-photo-wrap img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;filter:brightness(0.92) contrast(1.04)}
.hero-photo-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(12,12,12,0.55) 0%,transparent 50%)}
.hero-float-card{position:absolute;bottom:40px;right:-30px;background:var(--dark2);border:1px solid var(--border);padding:18px 22px;min-width:160px;box-shadow:0 8px 40px rgba(0,0,0,0.4);animation:fadeIn 1s 1s both}
.float-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;color:var(--gold);line-height:1;direction:ltr}
.float-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:4px}
.hero-float-card2{position:absolute;top:120px;left:-30px;background:var(--gold);padding:14px 20px;animation:fadeIn 1s 1.1s both}
.float2-text{font-size:11px;font-weight:800;color:var(--dark);letter-spacing:2px;line-height:1.6;direction:ltr}

/* STATS with counter */
.stats{background:var(--dark2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:0 5%;display:flex;align-items:center;flex-direction:row;flex-wrap:nowrap}
.stat{text-align:center;padding:0 24px;position:relative}
.stat+.stat::before{content:'';position:absolute;right:0;top:10%;height:80%;width:1px;background:var(--border)}
.stat-num{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;color:var(--gold);line-height:1;direction:ltr;display:block}
.stat-label{font-size:12px;color:var(--muted);letter-spacing:1px;margin-top:6px;font-weight:400}

/* EYEBROW */
.sec-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sec-eyebrow .line{width:36px;height:1px;background:var(--gold)}
.sec-eyebrow span{font-size:11px;font-weight:600;color:var(--gold);letter-spacing:3px;text-transform:uppercase}

/* ABOUT */
.about{padding:60px 5%;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about h2{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,52px);font-weight:700;line-height:1.2;margin-bottom:24px}
.about p{font-size:15px;color:var(--muted);line-height:1.85;font-weight:300;margin-bottom:16px}
.about-features{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:30px 0}
.feature-item{display:flex;align-items:flex-start;gap:10px}
.feature-icon{width:32px;height:32px;flex-shrink:0;background:rgba(201,168,76,0.12);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:2px}
.feature-text{font-size:13px;color:var(--muted);line-height:1.5;font-weight:300}

/* PROGRESS BARS */


.awards-side{display:flex;flex-direction:column;gap:16px}
.award-big{background:var(--dark3);border:1px solid var(--border);padding:28px 24px;border-radius:16px;position:relative;overflow:hidden}
.award-big::before{content:'';position:absolute;top:0;right:0;width:4px;height:100%;background:var(--gold)}
.award-big-year{font-size:11px;color:var(--gold);letter-spacing:2px;font-weight:600;margin-bottom:8px;direction:ltr;display:inline-block}
.award-big-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:4px}
.award-big-sub{font-size:13px;color:var(--muted);font-weight:300}
.awards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.award-mini{background:var(--dark2);border:1px solid var(--border);padding:16px 14px;border-radius:12px;text-align:center;transition:border-color 0.3s}
.award-mini:hover{border-color:rgba(201,168,76,0.5)}
.award-mini-year{font-size:10px;color:var(--gold);letter-spacing:1.5px;font-weight:600;margin-bottom:6px;display:block;direction:ltr}
.award-mini-label{font-size:11px;color:var(--muted);line-height:1.4}

/* GALLERY */
.gallery-section{padding:0 5% 52px}
.gallery-grid{display:grid;grid-template-columns:1.2fr 0.8fr;gap:20px}
.gallery-main{position:relative;overflow:hidden}
.gallery-main img{width:100%;display:block;height:520px;object-fit:cover;object-position:top;transition:transform 0.6s ease}
.gallery-main:hover img{transform:scale(1.03)}
.gallery-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(12,12,12,0.9));padding:40px 28px 28px}
.gallery-overlay h3{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:6px}
.gallery-overlay p{font-size:13px;color:var(--muted);font-weight:300}
.gallery-side{display:flex;flex-direction:column;gap:20px}
.info-card{background:var(--dark3);border:1px solid var(--border);padding:28px 24px;border-radius:16px;flex:1}
.info-card p{font-size:14px;color:var(--muted);line-height:1.75;font-weight:300}
.tags{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.tag{background:rgba(201,168,76,0.08);border:1px solid var(--border);padding:8px 14px;font-size:12px;color:var(--gold);font-weight:500}
.getit-card{background:var(--dark2);border:1px solid var(--border);padding:24px;border-radius:16px;display:flex;align-items:center;gap:20px}
.getit-text{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;color:var(--gold);line-height:1.1;flex-shrink:0;direction:ltr}
.getit-desc{font-size:13px;color:var(--muted);line-height:1.7;font-weight:300}

/* COINS */
.coins-section{background:var(--dark2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:56px 5%;text-align:center}
.coins-section h2{font-family:'Playfair Display',serif;font-size:clamp(30px,4vw,48px);font-weight:700;margin-bottom:12px}
.coins-section .lead{font-size:15px;color:var(--muted);max-width:500px;margin:0 auto 56px;font-weight:300;line-height:1.7}
.coins-track{display:flex;align-items:center;justify-content:center;flex-wrap:nowrap;overflow-x:auto;padding:10px 0}
.coin-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.coin{width:88px;height:88px;border-radius:50%;background:conic-gradient(from 135deg,#8B6914,#E8D08A 25%,#C9A84C 50%,#B8922A 75%,#8B6914);display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 24px rgba(201,168,76,0.2),inset 0 2px 4px rgba(255,255,255,0.15);transition:transform 0.3s,box-shadow 0.3s}
.coin:hover{transform:scale(1.08) rotate(5deg);box-shadow:0 0 40px rgba(201,168,76,0.5)}
.coin::before{content:'';position:absolute;inset:4px;border-radius:50%;border:1px solid rgba(255,255,255,0.18)}
.coin-inner{text-align:center;position:relative;z-index:1}
.coin-top{font-size:7px;font-weight:800;letter-spacing:1.5px;color:#3A2200;display:block;direction:ltr}
.coin-num{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:#2A1800;line-height:1;display:block;direction:ltr}
.coin-bot{font-size:6px;color:#4A3000;display:block;letter-spacing:0.5px;direction:ltr}
.coin.big{width:104px;height:104px;box-shadow:0 0 40px rgba(201,168,76,0.45)}
.coin.big .coin-num{font-size:21px}
.coin-year{font-size:12px;color:var(--muted);letter-spacing:1px;direction:ltr}
.coin-year.active{color:var(--gold);font-weight:600}
.coin-line{width:40px;height:1px;background:var(--border);margin-bottom:14px;flex-shrink:0}
.midrag-strip{margin-top:52px;display:inline-flex;align-items:center;gap:20px;border:1px solid var(--border);background:rgba(201,168,76,0.05);padding:20px 32px}
.midrag-pill{background:var(--gold);color:var(--dark);font-size:10px;font-weight:800;letter-spacing:2.5px;padding:6px 14px}
.midrag-strip p{font-size:14px;color:var(--muted);font-weight:300}
.midrag-strip a{color:var(--gold);font-size:14px;font-weight:600;text-decoration:none;border-bottom:1px solid rgba(201,168,76,0.4);padding-bottom:2px;white-space:nowrap;transition:border-color 0.2s}

/* SERVICES */
.services{padding:60px 5%}
.services h2{font-family:'Playfair Display',serif;font-size:clamp(30px,4vw,48px);font-weight:700;margin-bottom:10px}
.services-lead{font-size:15px;color:var(--muted);font-weight:300;margin-bottom:52px}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.service-card{background:var(--dark2);border:1px solid var(--border);padding:32px 26px;position:relative;border-radius:16px;overflow:hidden;transition:border-color 0.3s,transform 0.2s}
.service-card:hover{border-color:rgba(201,168,76,0.5);transform:translateY(-4px)}
.service-card::after{content:'';position:absolute;bottom:0;right:0;width:100%;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transform:scaleX(0);transform-origin:right;transition:transform 0.3s}
.service-card:hover::after{transform:scaleX(1)}
.service-icon{font-size:28px;margin-bottom:18px;display:block}
.service-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:10px}
.service-text{font-size:14px;color:var(--muted);line-height:1.75;font-weight:300}

/* SOCIAL PROOF */
.social-proof{background:var(--dark);border-top:1px solid var(--border);padding:80px 5%}
.social-proof h2{font-family:'Playfair Display',serif;font-size:clamp(30px,4vw,48px);font-weight:700;text-align:center;margin-bottom:52px}
.proof-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:900px;margin:0 auto}
.proof-card{background:var(--dark2);border:1px solid var(--border);padding:36px 32px;border-radius:16px;display:flex;flex-direction:column;gap:20px;transition:border-color 0.3s,transform 0.2s}
.proof-card:hover{border-color:rgba(201,168,76,0.4);transform:translateY(-3px)}
.proof-platform{display:flex;align-items:center;gap:14px}
.proof-icon{width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.proof-platform-name{font-size:11px;color:var(--gold);letter-spacing:2px;font-weight:600;text-transform:uppercase;margin-bottom:3px}
.proof-platform-title{font-size:15px;font-weight:600}
.proof-num{font-family:'Playfair Display',serif;font-size:52px;font-weight:900;color:var(--gold);line-height:1;direction:ltr}
.proof-num-row{display:flex;align-items:baseline;gap:10px}
.proof-num-label{font-size:15px;color:var(--muted);font-weight:300}
.proof-stars{color:#FFC107;font-size:20px;letter-spacing:3px}
.proof-desc{font-size:14px;color:var(--muted);font-weight:300;line-height:1.7}
.proof-btn-fb{background:#1877F2;color:#fff;font-family:'Assistant',sans-serif;font-size:14px;font-weight:700;padding:13px 28px;text-decoration:none;display:inline-block;text-align:center;transition:opacity 0.2s;letter-spacing:0.5px}
.proof-btn-fb:hover{opacity:0.85}
.proof-btn-gold{background:var(--gold);color:var(--dark);font-family:'Assistant',sans-serif;font-size:14px;font-weight:700;padding:13px 28px;text-decoration:none;display:inline-block;text-align:center;transition:opacity 0.2s;letter-spacing:0.5px}
.proof-btn-gold:hover{opacity:0.85}

/* TESTIMONIALS */
.testimonials{background:var(--dark3);padding:60px 5%;border-top:1px solid var(--border)}
.testimonials h2{font-family:'Playfair Display',serif;font-size:clamp(30px,4vw,48px);font-weight:700;text-align:center;margin-bottom:10px}
.t-lead{text-align:center;font-size:15px;color:var(--muted);font-weight:300;margin-bottom:52px}
.t-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.t-placeholder{background:var(--dark);border:1px dashed rgba(201,168,76,0.2);padding:30px 24px;display:flex;align-items:center;justify-content:center;min-height:200px}
.t-placeholder p{font-size:13px;color:rgba(245,242,236,0.3);text-align:center;font-weight:300}
.t-card{background:var(--dark);border:1px solid var(--border);padding:30px 24px;position:relative;border-radius:16px;transition:border-color 0.3s}
.t-card:hover{border-color:rgba(201,168,76,0.4)}
.t-quote{font-size:52px;color:var(--gold);opacity:0.15;font-family:'Playfair Display',serif;line-height:1;position:absolute;top:14px;right:20px;direction:ltr}
.t-stars{color:#FFC107;font-size:14px;margin-bottom:14px;letter-spacing:2px}
.t-text{font-size:14px;color:var(--muted);line-height:1.8;font-weight:300;margin-bottom:22px;position:relative;z-index:1}
.t-author{font-size:13px;font-weight:600}
.t-detail{font-size:12px;color:var(--gold);margin-top:3px;font-weight:400}

/* CONTACT */
.contact{padding:60px 5%;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
.contact h2{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,52px);font-weight:700;line-height:1.2;margin-bottom:18px}
.contact-lead{font-size:15px;color:var(--muted);font-weight:300;line-height:1.8;margin-bottom:36px}
.contact-links{display:flex;flex-direction:column;gap:14px}
